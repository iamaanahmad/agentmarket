version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "=== AgentMarket Build Started ==="
        - echo "Node.js version:"
        - node --version
        - echo "npm version:"
        - npm --version
        - echo "Cleaning npm cache and SWC cache..."
        - npm cache clean --force
        - rm -rf /root/.cache/next-swc || true
        - echo "Installing dependencies..."
        - npm ci --legacy-peer-deps
        - echo "Pre-installing Next.js SWC compiler with retry logic..."
        - |
          for i in 1 2 3; do
            echo "Attempt $i: Installing @next/swc-linux-x64-gnu@14.0.3"
            if npm install --no-save --force @next/swc-linux-x64-gnu@14.0.3; then
              echo "SWC compiler installed successfully"
              break
            else
              echo "Attempt $i failed, cleaning cache and retrying..."
              npm cache clean --force
              rm -rf /root/.cache/next-swc || true
              sleep 2
            fi
          done
        - echo "Dependencies installed successfully"
    build:
      commands:
        - echo "=== Building Next.js Application ==="
        - echo "Building production bundle..."
        - npm run build
        - echo "=== Build Completed Successfully ==="
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .next/static/**/*

# Environment variables for the application
# Note: Add sensitive variables (API keys, secrets) in Amplify Console
env:
  variables:
    # Solana Network Configuration
    NEXT_PUBLIC_SOLANA_NETWORK: devnet
    NEXT_PUBLIC_SOLANA_RPC_ENDPOINT: https://api.devnet.solana.com
    
    # Smart Contract Program IDs
    NEXT_PUBLIC_AGENT_REGISTRY_PROGRAM_ID: 8RDfVnQJiW7Nn9qbWubNUVJh6B7fmgxCY86TqjSHjTuu
    NEXT_PUBLIC_MARKETPLACE_ESCROW_PROGRAM_ID: 8HQ4FBCBjf5jqCW6DNYjpAK4BGujAHD9MWH8bitVK2EV
    NEXT_PUBLIC_REPUTATION_SYSTEM_PROGRAM_ID: EXvxVW73eF359VWGeCM3hV431uaFyXvKbHzKqgjYJCVY
    NEXT_PUBLIC_ROYALTY_SPLITTER_PROGRAM_ID: 5VRG5k7ad2DgyMFYfZ7QCN3AJPtuoH7WiJukc8ueddHL
    
    # Build Configuration
    NODE_ENV: production
    NEXT_TELEMETRY_DISABLED: 1
    NEXT_SKIP_NATIVE_POSTINSTALL: 1
    SWC_BINARY_PATH: /codebuild/output/src2198129213/src/agentmarket/node_modules/@next/swc-linux-x64-gnu
    
    # Application Metadata
    NEXT_PUBLIC_APP_NAME: AgentMarket
    NEXT_PUBLIC_APP_URL: https://main.d1qz5jyb1c9oee.amplifyapp.com
